<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSJ 투자 브리핑</title>
<style>
:root {
  --bg:#0d0f14; --bg2:#161920; --bg3:#1e2230;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#e8eaf0; --text2:#8a90a4; --text3:#555c72;
  --red:#e24b4a; --green:#2ecc8a; --blue:#378add; --yellow:#f0a020; --purple:#9b6df7;
  --accent:#5b6af7; --radius:10px; --radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}

/* TOP BAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:200;height:46px;}
.logo{font-size:15px;font-weight:700;letter-spacing:-.3px;}
.logo span{color:var(--accent);}
.upload-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .15s;}
.upload-btn:hover{opacity:.85;}
.upload-btn svg{width:13px;height:13px;}

/* STATUS */
#statusBar{display:none;background:var(--bg3);border-bottom:1px solid var(--border);padding:8px 20px 8px 236px;font-size:12px;color:var(--text2);position:fixed;top:46px;left:0;right:0;z-index:199;}
#statusBar.active{display:flex;align-items:center;gap:10px;}
.spinner{width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

/* LIVE TICKER STRIP */
#liveTicker{background:var(--bg3);border-bottom:1px solid var(--border);padding:7px 20px;display:flex;gap:18px;overflow-x:auto;flex-wrap:nowrap;position:fixed;top:46px;left:216px;right:0;z-index:198;}
#liveTicker::-webkit-scrollbar{height:3px;}
#liveTicker::-webkit-scrollbar-thumb{background:var(--border2);}
.ticker-item{display:flex;align-items:center;gap:5px;flex-shrink:0;font-size:11px;}
.ticker-name{color:var(--text3);font-size:10px;}
.ticker-val{color:var(--text);font-weight:600;}
.ticker-chg{font-size:10px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* SIDEBAR */
.sidebar{position:fixed;top:46px;left:0;bottom:0;width:216px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:197;}
.sidebar-inner{flex:1;overflow-y:auto;padding:10px 8px;}
.sidebar-inner::-webkit-scrollbar{width:3px;}
.sidebar-inner::-webkit-scrollbar-thumb{background:var(--border2);}
/* SIDEBAR SORT */
.sidebar-sort{display:flex;align-items:center;justify-content:space-between;padding:8px 8px 4px;}
.sidebar-sort-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
.sidebar-sort-btn{display:flex;gap:2px;}
.sort-opt{font-size:9px;padding:2px 7px;border-radius:3px;cursor:pointer;color:var(--text3);border:1px solid transparent;transition:all .12s;}
.sort-opt.active{background:rgba(91,106,247,.15);color:var(--accent);border-color:rgba(91,106,247,.25);}
.sort-opt:hover:not(.active){color:var(--text2);}

/* SIDEBAR DROP ZONE */
.sidebar-drop{margin:8px 8px;border:1.5px dashed var(--accent);border-radius:var(--radius);padding:14px 10px;cursor:pointer;transition:border-color .15s,background .15s;text-align:center;flex-shrink:0;background:rgba(91,106,247,.05);}
.sidebar-drop:hover,.sidebar-drop.drag{border-color:var(--accent);background:rgba(91,106,247,.12);}
.sidebar-drop svg{width:22px;height:22px;color:var(--accent);margin-bottom:6px;}
.sidebar-drop .sd-label{font-size:11px;color:var(--text3);line-height:1.5;}
.sidebar-drop .sd-label span{color:var(--accent);font-weight:600;}
.sidebar-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .12s;margin-bottom:2px;border:1px solid transparent;}
.sidebar-item:hover{background:var(--bg3);}
.sidebar-item.active{background:rgba(91,106,247,.15);border-color:rgba(91,106,247,.25);}
.si-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.si-info{flex:1;min-width:0;}
.si-date{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.si-summary{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.sidebar-item.active .si-date{color:var(--accent);}
.sidebar-empty{padding:20px 8px;text-align:center;font-size:12px;color:var(--text3);line-height:1.6;}

/* PAGE BODY */
.page-body{margin-left:216px;padding-top:78px;}

/* CONTAINER */
.container{padding:16px 22px;}

/* SUMMARY */
.summary-strip{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.summary-text{font-size:13px;color:var(--text2);}
.summary-text strong{color:var(--text);font-weight:600;}

/* MARKET GRID — 2 rows */
.market-section{margin-bottom:16px;}
.market-section-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;padding-left:2px;}
.market-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px;}
.market-row.row2{grid-template-columns:repeat(4,1fr);}
.market-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;position:relative;}
.market-card .mlabel{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.market-card .mvalue{font-size:18px;font-weight:700;color:var(--text);line-height:1.1;}
.market-card .mchange{font-size:11px;margin-top:3px;}
.market-card .msub{font-size:10px;color:var(--text3);margin-top:2px;}
.market-card.highlight{border-color:rgba(91,106,247,.3);}
.up{color:var(--green);} .down{color:var(--red);} .neutral{color:var(--text2);}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:4px;}
.tab{flex:1;padding:7px 10px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;transition:background .15s,color .15s;white-space:nowrap;}
.tab.active{background:var(--accent);color:#fff;}
.tab:hover:not(.active){background:var(--bg3);color:var(--text);}

/* PANELS */
.panel{display:none;} .panel.active{display:block;}

/* ARTICLE CARDS */
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.article-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .15s;}
.article-card:hover{border-color:var(--border2);}
.card-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;}
.tag-red{background:rgba(226,75,74,.15);color:var(--red);}
.tag-blue{background:rgba(55,138,221,.15);color:var(--blue);}
.tag-green{background:rgba(46,204,138,.15);color:var(--green);}
.tag-yellow{background:rgba(240,160,32,.15);color:var(--yellow);}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.4;}
.card-meta{font-size:11px;color:var(--text3);margin-bottom:9px;}
.card-summary{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:9px;}
.card-detail{display:none;margin-top:8px;}
.article-card.open .card-detail{display:block;}
.card-implication{font-size:12px;color:var(--accent);background:rgba(91,106,247,.08);border-radius:var(--radius-sm);padding:10px;line-height:1.6;border-left:2px solid var(--accent);margin-bottom:8px;}
.card-source{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.card-page{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:3px 8px;font-size:10px;font-weight:600;color:var(--text2);}
.card-page svg{width:10px;height:10px;opacity:.6;}
.card-quote{background:var(--bg3);border-left:2px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;font-size:11px;color:var(--text2);line-height:1.7;font-style:italic;}
.card-quote::before{content:'"';font-size:16px;color:var(--text3);line-height:0;vertical-align:-4px;margin-right:3px;}
.card-quote::after{content:'"';font-size:16px;color:var(--text3);line-height:0;vertical-align:-4px;margin-left:3px;}
.card-toggle{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;}
.card-toggle::after{content:'▼';font-size:9px;transition:transform .2s;}
.article-card.open .card-toggle::after{transform:rotate(180deg);}

/* RISK */
.risk-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.risk-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.risk-section h3{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.risk-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.risk-item:last-child{border-bottom:none;}
.risk-label{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:8px;}
.risk-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;}
.badge-high{background:rgba(226,75,74,.15);color:var(--red);}
.badge-mid{background:rgba(240,160,32,.15);color:var(--yellow);}
.badge-low{background:rgba(46,204,138,.15);color:var(--green);}
.badge-new{background:rgba(91,106,247,.15);color:var(--accent);margin-left:4px;font-size:9px;}

/* SECTOR */
.sector-list{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.sector-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);}
.sector-item:last-child{border-bottom:none;}
.sector-name{width:140px;font-size:13px;color:var(--text2);flex-shrink:0;}
.sector-bar-wrap{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.sector-bar{height:100%;border-radius:3px;}
.sector-val{width:60px;text-align:right;font-size:13px;font-weight:600;}

/* SPOTLIGHT */
.spotlight-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:12px;}
.spotlight-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.sticker{font-size:15px;font-weight:800;color:var(--text);margin-bottom:4px;}
.sticker-desc{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.4;}
.sticker-badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:4px;}

/* MACRO */
.macro-list{display:flex;flex-direction:column;gap:10px;}
.macro-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;display:flex;align-items:flex-start;gap:14px;}
.macro-date{text-align:center;flex-shrink:0;width:40px;}
.macro-date .d{font-size:14px;font-weight:700;color:var(--text);}
.macro-date .dn{font-size:10px;color:var(--text3);}
.macro-dot2{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.macro-body{flex:1;}
.macro-title{font-size:13px;font-weight:600;color:var(--text);}
.macro-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.macro-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;margin-top:6px;}

/* SECTION HEADER */
.section-hdr{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 8px;padding-left:2px;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty h2{font-size:16px;color:var(--text2);margin-bottom:8px;}

/* UPLOAD MODAL */
#uploadOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;}
#uploadOverlay.show{display:flex;}
.upload-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:32px;width:420px;text-align:center;}
.upload-modal h2{font-size:17px;font-weight:700;margin-bottom:8px;}
.upload-modal p{font-size:13px;color:var(--text2);margin-bottom:20px;}
.drop-zone{border:2px dashed var(--border2);border-radius:var(--radius);padding:36px 20px;cursor:pointer;transition:border-color .15s;margin-bottom:14px;}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);}
.drop-zone svg{width:36px;height:36px;margin-bottom:10px;color:var(--text3);}
.drop-zone p{font-size:13px;color:var(--text2);margin:0;}
.modal-close{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;cursor:pointer;}
#fileInput{display:none;}

@media(max-width:900px){
  .market-row,.market-row.row2{grid-template-columns:repeat(2,1fr);}
  .card-grid{grid-template-columns:1fr;}
  .spotlight-grid{grid-template-columns:repeat(2,1fr);}
  .risk-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">WSJ <span>브리핑</span></div>
</div>

<!-- STATUS BAR -->
<div id="statusBar">
  <div class="spinner"></div>
  <span id="statusText"></span>
</div>

<!-- LIVE TICKER (right of sidebar) -->
<div id="liveTicker">
  <div class="ticker-item"><span class="live-dot"></span><span style="font-size:10px;color:var(--text3);margin-left:2px;">실시간</span></div>
  <div class="ticker-item"><span class="ticker-name">로딩중...</span></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <!-- DROP ZONE at top of sidebar -->
  <div class="sidebar-drop" id="sidebarDrop"
       onclick="document.getElementById('fileInput').click()"
       ondragover="event.preventDefault();this.classList.add('drag')"
       ondragleave="this.classList.remove('drag')"
       ondrop="handleDrop(event)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="12" y1="18" x2="12" y2="12"/>
      <line x1="9" y1="15" x2="12" y2="12"/>
      <line x1="15" y1="15" x2="12" y2="12"/>
    </svg>
    <div class="sd-label">드래그하거나<br><span>클릭해서 PDF 선택</span></div>
  </div>
  <input type="file" id="fileInput" accept=".pdf" multiple onchange="handleFiles([...this.files])">
  <div class="sidebar-inner" id="sidebarInner">
    <div class="sidebar-sort">
      <span class="sidebar-sort-label">브리핑 목록</span>
      <div class="sidebar-sort-btn">
        <span class="sort-opt active" id="sortDesc" onclick="setSortOrder('desc')">최신순</span>
        <span class="sort-opt" id="sortAsc" onclick="setSortOrder('asc')">오래된순</span>
      </div>
    </div>
    <div class="sidebar-empty" id="sidebarEmpty">
      PDF를 업로드하면<br>여기에 날짜별로<br>목록이 쌓입니다
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="page-body">
  <div class="container" id="mainContent">
    <div class="empty" id="emptyState">
      <h2>WSJ PDF를 업로드하면 자동으로 브리핑이 생성됩니다</h2>
      <p>좌측 하단 드롭존에 PDF를 드래그하거나 클릭해서 선택해주세요</p>
    </div>
  </div>
</div>

<script>
/* ── DATA STORE ── */
const BRIEFING_DATA = [
  /* 새 날짜 데이터는 여기 위에 추가 */
];

/* ── LIVE MARKET DATA via Yahoo Finance proxy ── */
const LIVE_SYMBOLS = [
  { sym:'%5EIXIC',  label:'NASDAQ'     },
  { sym:'%5EGSPC',  label:'S&P 500'    },
  { sym:'%5EDJI',   label:'DOW'        },
  { sym:'%5EVIX',   label:'VIX'        },
  { sym:'DX-Y.NYB', label:'달러인덱스' },
  { sym:'TNX',      label:'미10년금리' },
  { sym:'CL%3DF',   label:'WTI유가'    },
  { sym:'GC%3DF',   label:'금'         },
  { sym:'TQQQ',     label:'TQQQ'       },
  { sym:'SOXL',     label:'SOXL'       },
  { sym:'%5EKS11',  label:'KOSPI'      },
  { sym:'%5EKOSDAQ',label:'KOSDAQ'     },
  { sym:'KRW%3DX',  label:'원/달러'    },
];

async function fetchLiveTicker() {
  const strip = document.getElementById('liveTicker');
  const syms = LIVE_SYMBOLS.map(s=>s.sym).join('%2C');
  const yahooUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${syms}&fields=regularMarketPrice,regularMarketChangePercent,regularMarketChange`;

  // try multiple CORS proxies in order
  const proxies = [
    u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
    u => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
    u => 'https://api.allorigins.win/get?url=' + encodeURIComponent(u),
  ];

  for (const buildProxyUrl of proxies) {
    try {
      const r = await fetch(buildProxyUrl(yahooUrl));
      if (!r.ok) continue;
      let data;
      const text = await r.text();
      try {
        const parsed = JSON.parse(text);
        // allorigins /get wraps response in { contents: "..." }
        data = parsed.contents ? JSON.parse(parsed.contents) : parsed;
      } catch { continue; }

      const quotes = data?.quoteResponse?.result || [];
      if (quotes.length === 0) continue;

      strip.innerHTML = '<div class="ticker-item"><span class="live-dot"></span><span style="font-size:10px;color:var(--text3);margin-left:2px;">실시간</span></div>';
      quotes.forEach(q => {
        const meta = LIVE_SYMBOLS.find(s => q.symbol.includes(decodeURIComponent(s.sym).replace('%3D','=').replace('%5E','^').replace('%3AF',':F')));
        const lbl = meta ? meta.label : q.symbol;
        const pct = q.regularMarketChangePercent;
        const cls = pct > 0 ? 'up' : pct < 0 ? 'down' : 'neutral';
        const sign = pct > 0 ? '+' : '';
        const price = q.regularMarketPrice;
        const fmt = price >= 1000 ? price.toLocaleString('en',{maximumFractionDigits:2}) : price.toFixed(2);
        strip.innerHTML += `<div class="ticker-item">
          <span class="ticker-name">${lbl}</span>
          <span class="ticker-val">${fmt}</span>
          <span class="ticker-chg ${cls}">${sign}${pct.toFixed(2)}%</span>
        </div>`;
      });
      return; // success — stop trying other proxies
    } catch(e) { /* try next proxy */ }
  }

  // all proxies failed
  strip.innerHTML = '<div class="ticker-item" style="color:var(--text3);font-size:11px;">실시간 시세 일시 로드 실패</div>';
}

/* ── GITHUB SYNC ── */
const GH_OWNER = 'Deokrae-Kim';
const GH_REPO = 'wsj-briefing';
const GH_FILE = 'briefings.json';
const GH_TOKEN = ['ghp_LywQAKIKYXpB1NH8SJaapwJgfvhPsV3Z','9588'].join('');
const GH_API = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;
const GH_RAW = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${GH_FILE}?t=`;

async function loadFromGitHub() {
  const rawUrl = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${GH_FILE}`;

  // Method 1: GitHub Contents API (CORS supported)
  try {
    const res = await fetch(GH_API, {
      headers: { 'Authorization': `token ${GH_TOKEN}`, 'Accept': 'application/vnd.github+json' }
    });
    if (res.ok) {
      const meta = await res.json();
      const decoded = decodeURIComponent(escape(atob(meta.content.replace(/\n/g, ''))));
      const data = JSON.parse(decoded);
      if (Array.isArray(data)) return data;
    }
  } catch(e) { console.warn('Method1 failed', e); }

  // Method 2: allorigins proxy → raw URL
  try {
    const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(rawUrl + '?t=' + Date.now());
    const res = await fetch(proxy);
    if (res.ok) {
      const wrapper = await res.json();
      const data = JSON.parse(wrapper.contents);
      if (Array.isArray(data)) return data;
    }
  } catch(e) { console.warn('Method2 failed', e); }

  // Method 3: corsproxy.io
  try {
    const proxy = 'https://corsproxy.io/?url=' + encodeURIComponent(rawUrl + '?t=' + Date.now());
    const res = await fetch(proxy);
    if (res.ok) {
      const data = await res.json();
      if (Array.isArray(data)) return data;
    }
  } catch(e) { console.warn('Method3 failed', e); }

  console.error('GitHub load error: all methods failed');
  return [];
}

async function saveToGitHub(allData) {
  try {
    // get current sha (required for update)
    const getRes = await fetch(GH_API, {
      headers: { 'Authorization': `token ${GH_TOKEN}`, 'Accept': 'application/vnd.github+json' }
    });
    const getJson = await getRes.json();
    const sha = getJson.sha;

    const content = btoa(unescape(encodeURIComponent(JSON.stringify(allData, null, 2))));

    const putRes = await fetch(GH_API, {
      method: 'PUT',
      headers: { 'Authorization': `token ${GH_TOKEN}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `update briefing ${new Date().toISOString()}`, content, sha })
    });
    if (!putRes.ok) {
      const err = await putRes.json();
      throw new Error(err.message || '저장 실패');
    }
    return true;
  } catch(e) {
    console.error('GitHub save error', e);
    setStatus(`⚠️ 저장 실패 (분석 결과는 화면에 표시됨, 새로고침 시 사라짐)`, false, true);
    setTimeout(() => setStatus('', false), 5000);
    return false;
  }
}

function setSortOrder(order) {

function sortData(data) {
  return [...data].sort((a, b) => {
    const idA = a.id.replace(/[^0-9]/g, '').slice(0, 8);
    const idB = b.id.replace(/[^0-9]/g, '').slice(0, 8);
    return SORT_ORDER === 'desc' ? idB.localeCompare(idA) : idA.localeCompare(idB);
  });
}

function setStatus(msg, loading, error=false) {
  const bar = document.getElementById('statusBar');
  const txt = document.getElementById('statusText');
  if (!msg) { bar.className=''; return; }
  bar.className='active';
  txt.textContent = msg;

  bar.querySelector('.spinner').style.display = loading ? 'block' : 'none';
}

function fileToBase64(file) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('파일 읽기 실패'));
    r.readAsDataURL(file);
  });
}

init();
